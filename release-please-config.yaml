packages:
  .:
    release-type: go
    package-name: git-ctx
    draft: false
    pr-template: |
      ## Summary
      {{? changes.body }}
      {{changes.body}}
      {{? }}

      ## Scope
      {{? changes.scope }}
      - **Scope**: {{changes.scope}}
      {{? }}
    segments:
      - type: feat
        section: Features
        hidden: false
      - type: fix
        section: Bug Fixes
        hidden: false
      - type: perf
        section: Performance
        hidden: false
      - type: refactor
        section: Refactoring
        hidden: false
      - type: docs
        section: Documentation
        hidden: false
      - type: test
        section: Tests
        hidden: true
      - type: chore
        section: Maintenance
        hidden: true
